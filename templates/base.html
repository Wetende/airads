{% load static vite_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{{ platform_branding.institution_name|default:"LMS" }}</title>
    {% if platform_branding.favicon_url %}
    <link rel="icon" href="{{ platform_branding.favicon_url }}">
    <link rel="shortcut icon" href="{{ platform_branding.favicon_url }}">
    {% endif %}
    {% vite_assets 'src/main.jsx' %}
</head>
<body>
    {% block inertia %}{% endblock %}
    <script>
        window.kyroChatConfig = {
            botId: "5ecfa6fd-59d4-4e21-b900-dbc8f03719e3"
        };
    </script>
    <script src="https://kyrochat.com/widget.js" defer></script>
</body>
</html>
